name: Environment and Secrets Demo

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options:
          - development
          - staging
          - production
      debug:
        description: 'Enable debug mode'
        type: boolean
        default: false

env:
  APP_NAME: cicd-devops-lab
  GLOBAL_VAR: "I am global"

jobs:
  show-context:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    env:
      JOB_VAR: "I am job-level"
    steps:
      - name: GitHub context
        run: |
          echo "Repository: ${{ github.repository }}"
          echo "Branch: ${{ github.ref_name }}"
          echo "SHA: ${{ github.sha }}"
          echo "Actor: ${{ github.actor }}"
          echo "Event: ${{ github.event_name }}"
          echo "Run ID: ${{ github.run_id }}"
          echo "Run number: ${{ github.run_number }}"

      - name: Input parameters
        run: |
          echo "Environment: ${{ inputs.environment }}"
          echo "Debug: ${{ inputs.debug }}"

      - name: Environment variables
        env:
          STEP_VAR: "I am step-level"
        run: |
          echo "Global: $GLOBAL_VAR"
          echo "Job: $JOB_VAR"
          echo "Step: $STEP_VAR"
          echo "App: $APP_NAME"

      - name: Use secret (masked in logs)
        env:
          TOKEN: ${{ secrets.DEPLOY_TOKEN }}
        run: |
          echo "Token length: ${#TOKEN}"
          # Secret jest maskowany - nie wyswietli sie w logach
          echo "Token: $TOKEN"

      - name: Conditional step
        if: ${{ inputs.debug == true }}
        run: echo "Debug mode is ON"

      - name: Set output
        id: version
        run: echo "value=1.0.${{ github.run_number }}" >> $GITHUB_OUTPUT

      - name: Use output
        run: 'echo "Version: ${{ steps.version.outputs.value }}"'